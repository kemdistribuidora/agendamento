<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Administrativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #1769aa;
      --brand-dark: #0f416f;
      --brand-soft: #e8f3fb;
      --accent: #00a39b;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe4ee;
      --canvas: #f6f8fb;
      --radius: 8px;
      --shadow: 0 24px 70px rgba(15, 35, 60, .18);
      --shadow-sm: 0 8px 22px rgba(15, 35, 60, .08);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(0, 163, 155, .18), transparent 30%),
        linear-gradient(135deg, #eef5fb 0%, var(--canvas) 48%, #fff 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .shell {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
      gap: clamp(22px, 5vw, 54px);
      align-items: center;
    }

    .intro {
      padding: 10px 0;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--brand-dark);
      background: var(--brand-soft);
      border: 1px solid #cfe6f7;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 16px;
    }

    .intro p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 540px;
    }

    .card {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(219, 228, 238, .96);
      border-radius: var(--radius);
      padding: clamp(22px, 4vw, 32px);
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 22px;
    }

    .card-title i { color: var(--brand); }
    .form-group { margin-bottom: 17px; }

    label {
      display: block;
      margin-bottom: 7px;
      color: #40516a;
      font-size: .79rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      color: var(--muted);
      pointer-events: none;
      display: inline-flex;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 0 44px 0 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fbfdff;
      font: inherit;
      font-size: .94rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(23, 105, 170, .12);
    }

    input::placeholder { color: #94a3b8; }

    .toggle-senha {
      position: absolute;
      right: 8px;
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      border: 0;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-senha:hover { background: #eef3f7; color: var(--ink); }

    .alert-error {
      margin-bottom: 18px;
      padding: 12px 13px;
      border-radius: var(--radius);
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid #ffd1cc;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      font-size: .9rem;
      font-weight: 700;
    }

    .btn-primary {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      box-shadow: 0 12px 28px rgba(23, 105, 170, .2);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: transform .12s, box-shadow .2s, opacity .2s;
      margin-top: 5px;
    }

    .btn-primary:hover:not(:disabled) { box-shadow: 0 16px 34px rgba(23, 105, 170, .28); }
    .btn-primary:active:not(:disabled) { transform: scale(.99); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      min-height: 40px;
      margin-top: 16px;
      color: var(--brand-dark);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-link:hover { color: var(--brand); }

    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; }
      .intro { text-align: left; }
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .intro p { display: none; }
    }
  </style>
</head>
<body>

<main class="shell" x-data="login()" x-init="init()">
  <section class="intro" aria-label="Acesso administrativo">
    <div class="brand-icon"><i data-lucide="shield-check" width="28" height="28"></i></div>
    <div class="eyebrow"><i data-lucide="lock-keyhole" width="15" height="15"></i> Acesso restrito</div>
    <h1>Area administrativa.</h1>
    <p>Entre para acompanhar agendamentos, aprovar solicitacoes, reprovar pendencias e manter o recebimento organizado.</p>
  </section>

  <section>
    <div class="card">
      <div class="card-title"><i data-lucide="user-round-check" width="21" height="21"></i> Login do painel</div>

      <div class="alert-error" x-show="erro" x-transition>
        <i data-lucide="circle-alert" width="18" height="18"></i>
        <span x-text="erro"></span>
      </div>

      <div class="form-group">
        <label>Usuario</label>
        <div class="input-wrap">
          <span class="input-icon"><i data-lucide="user" width="18" height="18"></i></span>
          <input type="text" x-model="usuario"
                 placeholder="Digite o usuario"
                 autocomplete="username"
                 @keydown.enter="entrar()">
        </div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrap">
          <span class="input-icon"><i data-lucide="key-round" width="18" height="18"></i></span>
          <input :type="mostrarSenha ? 'text' : 'password'"
                 x-model="senha"
                 placeholder="Digite a senha"
                 autocomplete="current-password"
                 @keydown.enter="entrar()">
          <button class="toggle-senha" @click="mostrarSenha = !mostrarSenha; renderIcons()"
                  type="button" :title="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'">
            <span x-html="mostrarSenha ? '<i data-lucide=&quot;eye-off&quot; width=&quot;18&quot; height=&quot;18&quot;></i>' : '<i data-lucide=&quot;eye&quot; width=&quot;18&quot; height=&quot;18&quot;></i>'"></span>
          </button>
        </div>
      </div>

      <button class="btn-primary" @click="entrar()" :disabled="carregando">
        <span class="spinner" x-show="carregando"></span>
        <span x-show="!carregando"><i data-lucide="log-in" width="18" height="18"></i></span>
        <span x-text="carregando ? 'Verificando...' : 'Entrar'"></span>
      </button>
    </div>

    <a href="javascript:history.back()" class="back-link">
      <i data-lucide="arrow-left" width="17" height="17"></i> Voltar ao portal
    </a>
  </section>
</main>

<script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxhbArGbLwpdvOJy4U7_sRf9qre9yKRHNNB3dWtnM6BBzLSMWATYafHVLo_mZsxq3QX/exec";

function renderIcons() {
  if (window.lucide) setTimeout(() => lucide.createIcons(), 0);
}

document.addEventListener('alpine:init', () => {
  Alpine.effect(() => renderIcons());
});

function login() {
  return {
    usuario: '',
    senha: '',
    erro: '',
    carregando: false,
    mostrarSenha: false,

    init() {
      renderIcons();
    },

    async chamarAPI(action, paramData = {}) {
      const response = await fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: action, data: paramData })
      });
      return await response.json();
    },

    irParaAdmin() {
      const urlAtual = window.location.href.split('?')[0];

      // Hospedagem estatica (arquivos .html lado a lado)
      if (urlAtual.toLowerCase().endsWith('login.html')) {
        window.location.href = urlAtual.replace(/login\.html$/i, 'admin.html');
        return;
      }

      // Deploy no Apps Script: navega a janela de topo (fora do iframe sandbox)
      // para a URL real /exec com ?page=admin.
      (window.top || window).location.href = URL_APPS_SCRIPT + '?page=admin';
    },

    entrar() {
      if (!this.usuario.trim()) { this.erro = 'Informe o usuario.'; renderIcons(); return; }
      if (!this.senha.trim()) { this.erro = 'Informe a senha.'; renderIcons(); return; }

      this.erro = '';
      this.carregando = true;
      renderIcons();

      this.chamarAPI('loginAdmin', {
        usuario: this.usuario,
        senha: this.senha
      })
        .then(res => {
          this.carregando = false;
          if (res && res.ok) {
            this.irParaAdmin();
          } else {
            this.erro = res?.msg || 'Usuario ou senha invalidos.';
          }
          renderIcons();
        })
        .catch(() => {
          this.carregando = false;
          this.erro = 'Erro ao conectar. Tente novamente.';
          renderIcons();
        });
    }
  };
}
</script>
</body>
</html>
