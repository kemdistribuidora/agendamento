<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Agendamentos</title>
  <link rel="icon" type="image/png" href="imagens/Distribuidora_KEM.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #024a70;
      --brand-dark: #002a44;
      --brand-soft: #e8f1f8;
      --accent: #ee7a1c;
      --accent-dark: #c5331b;
      --accent-soft: #fdeede;
      --wave: linear-gradient(90deg, var(--accent), var(--accent-dark));
      --success: #16824a;
      --success-soft: #e8f7ef;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --warning: #b7791f;
      --warning-soft: #fff7e6;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe4ee;
      --surface: #ffffff;
      --canvas: #f6f8fb;
      --radius: 8px;
      --shadow: 0 16px 40px rgba(15, 35, 60, .1);
      --shadow-sm: 0 8px 22px rgba(15, 35, 60, .08);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(238, 122, 28, .10), transparent 28%),
        linear-gradient(180deg, #eef5fb 0%, var(--canvas) 36%, #fff 100%);
    }

    [x-cloak] { display: none !important; }

    header {
      min-height: 68px;
      padding: 12px clamp(16px, 3vw, 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(219, 228, 238, .86);
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 3px;
      background: var(--wave);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .stat-icon, .empty-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-logo {
      height: 42px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .header-text { min-width: 0; padding-left: 12px; border-left: 1px solid var(--line); }

    header h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: 0; }
    .header-sub { color: var(--muted); font-size: .8rem; margin-top: 2px; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-badge {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: var(--radius);
      color: var(--brand-dark);
      background: var(--brand-soft);
      border: 1px solid #c5d8e8;
      font-size: .8rem;
      font-weight: 800;
      white-space: nowrap;
    }

    main {
      width: min(1760px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 3vw, 30px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      min-height: 100px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(219, 228, 238, .95);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
    }

    .stat-icon.blue { color: var(--brand); background: var(--brand-soft); }
    .stat-icon.green { color: var(--success); background: var(--success-soft); }
    .stat-icon.yellow { color: var(--warning); background: var(--warning-soft); }
    .stat-icon.red { color: var(--danger); background: var(--danger-soft); }
    .stat-label { color: var(--muted); font-size: .74rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { color: var(--ink); font-size: 1.7rem; line-height: 1.1; font-weight: 800; margin-top: 3px; }

    .panel {
      background: rgba(255, 255, 255, .96);
      border: 1px solid rgba(219, 228, 238, .96);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .toolbar-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--ink);
    }

    .toolbar-sub {
      color: var(--muted);
      font-size: .82rem;
      margin-top: 3px;
    }

    .filters {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .field {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
      color: var(--ink);
      font: inherit;
      font-size: .86rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .field:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(2, 74, 112, .12);
    }

    .input-search {
      width: 260px;
      padding: 0 12px 0 46px;
      background-image: none;
    }

    .search-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .search-wrap i,
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .input-date { width: 154px; padding: 0 11px; }
    .select-filtro { min-width: 156px; padding: 0 11px; cursor: pointer; }

    .btn {
      min-height: 40px;
      border-radius: var(--radius);
      border: 0;
      padding: 0 14px;
      font: inherit;
      font-size: .86rem;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      transition: opacity .2s, transform .12s, box-shadow .2s;
    }

    .btn:hover:not(:disabled) { opacity: .9; }
    .btn:active:not(:disabled) { transform: scale(.99); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); box-shadow: 0 10px 22px rgba(2, 74, 112, .18); }
    .btn-success { color: #fff; background: var(--success); }
    .btn-danger { color: #fff; background: var(--danger); }
    .btn-ghost { color: var(--ink); background: #eef3f7; border: 1px solid var(--line); }
    .btn-icon { width: 40px; padding: 0; }
    .btn-sm { min-height: 32px; padding: 0 10px; font-size: .78rem; }

    /* Botões de ação só com ícone (quadrado) + tooltip no hover */
    .btn-acao {
      position: relative;
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
    }
    .btn-acao::after {
      content: attr(data-tip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      padding: 4px 9px;
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
      z-index: 60;
    }
    .btn-acao:hover::after { opacity: 1; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .86rem;
      min-width: 1200px;
    }

    thead th {
      padding: 12px 14px;
      color: #526176;
      background: #f8fbfd;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 13px 14px;
      border-bottom: 1px solid #edf2f7;
      color: var(--ink);
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:hover { background: #f9fcff; }
    tbody tr:last-child td { border-bottom: 0; }
    .td-data { font-weight: 800; white-space: nowrap; }
    .td-hora { color: var(--brand); font-weight: 800; white-space: nowrap; }
    .td-fornecedor { font-weight: 700; }
    .td-cnpj { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: .82rem; }
    .td-nota { color: var(--ink); font-weight: 700; }
    .td-email { color: var(--muted); font-size: .82rem; }
    .td-created { color: var(--muted); font-size: .8rem; white-space: nowrap; }

    .doc-list, .acoes {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: nowrap;
    }

    .link-doc {
      min-height: 30px;
      padding: 0 10px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: .76rem;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .link-xml { color: #9a4d00; background: #fff4e6; border-color: #ffdfb4; }
    .link-pdf { color: #a51d2d; background: #fff0f2; border-color: #ffd0d7; }

    .badge {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .74rem;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge-pendente { color: var(--warning); background: var(--warning-soft); border-color: #f5db9b; }
    .badge-reprovado { color: var(--danger); background: var(--danger-soft); border-color: #ffd1cc; }
    .badge-aprovado { color: var(--success); background: var(--success-soft); border-color: #bde9d1; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    .spinner-dark {
      border-color: var(--line);
      border-top-color: var(--brand);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row td, .empty-row td {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-state {
      display: grid;
      place-items: center;
      gap: 10px;
    }

    .empty-icon {
      width: 54px;
      height: 54px;
      border-radius: var(--radius);
      color: var(--brand);
      background: var(--brand-soft);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 120;
      min-height: 44px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 0 16px;
      border-radius: var(--radius);
      color: #fff;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: .9rem;
      font-weight: 800;
    }

    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }

    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .filters { justify-content: flex-start; }
    }

    @media (max-width: 640px) {
      header { align-items: flex-start; }
      .header-sub, .header-badge span { display: none; }
      .stats-grid { grid-template-columns: 1fr; }
      .filters, .search-wrap, .input-search, .input-date, .select-filtro { width: 100%; }
      .btn { width: 100%; }
      .btn-icon { width: 40px; }
      .btn-acao { width: 34px; }
    }
  </style>
</head>
<body x-data="painel()" x-init="init()">

  <header>
    <div class="header-left">
      <img class="header-logo" src="imagens/Distribuidora_KEM.png" alt="KEM - Distribuidora de Alimentos">
      <div class="header-text">
        <h1>Painel de Agendamentos</h1>
        <div class="header-sub">Acompanhe, aprove e gerencie entregas</div>
      </div>
    </div>
    <div class="header-actions">
      <span class="header-badge">
        <i data-lucide="database" width="16" height="16"></i>
        <span x-text="agendamentos.length + ' registros'"></span>
      </span>
      <button class="btn btn-ghost" onclick="sairPainel()">
        <i data-lucide="log-out" width="17" height="17"></i> Sair
      </button>
    </div>
  </header>

  <main>
    <section class="stats-grid" aria-label="Indicadores">
      <div class="stat-card">
        <div class="stat-icon blue"><i data-lucide="package-check" width="22" height="22"></i></div>
        <div>
          <div class="stat-label">Total agendados</div>
          <div class="stat-value" x-text="stats.agendados ?? '-'"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i data-lucide="calendar-check" width="22" height="22"></i></div>
        <div>
          <div class="stat-label">Hoje</div>
          <div class="stat-value" x-text="stats.hoje ?? '-'"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow"><i data-lucide="calendar-range" width="22" height="22"></i></div>
        <div>
          <div class="stat-label">Esta semana</div>
          <div class="stat-value" x-text="stats.semana ?? '-'"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i data-lucide="calendar-x" width="22" height="22"></i></div>
        <div>
          <div class="stat-label">Reprovados</div>
          <div class="stat-value" x-text="stats.reprovados ?? '-'"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div>
          <div class="toolbar-title">Agendamentos</div>
          <div class="toolbar-sub">Use filtros para encontrar fornecedores, datas e pendências.</div>
        </div>

        <div class="filters">
          <label class="search-wrap">
            <i data-lucide="search" width="17" height="17"></i>
            <input class="field input-search" type="text"
                   placeholder="Buscar fornecedor ou CNPJ"
                   x-model="filtros.busca"
                   @input.debounce.400ms="aplicarFiltros()">
          </label>

          <input class="field input-date" type="date"
                 x-model="filtros.data"
                 @change="aplicarFiltros()">

          <select class="field select-filtro" x-model="filtros.aprovacao" @change="aplicarFiltros()">
            <option value="">Todas as aprovações</option>
            <option value="PENDENTE">Pendente</option>
            <option value="APROVADO">Aprovado</option>
            <option value="REPROVADO">Reprovado</option>
          </select>

          <button class="btn btn-ghost" @click="limparFiltros()">
            <i data-lucide="eraser" width="17" height="17"></i> Limpar
          </button>

          <button class="btn btn-primary" @click="carregar()" :disabled="carregando">
            <span class="spinner" x-show="carregando"></span>
            <span x-show="!carregando"><i data-lucide="refresh-cw" width="17" height="17"></i></span>
            <span x-text="carregando ? 'Atualizando...' : 'Atualizar'"></span>
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Fornecedor</th>
              <th>CNPJ</th>
              <th>E-mail</th>
              <th>Nota</th>
              <th>Documentos</th>
              <th>Aprovação</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr class="loading-row" x-show="carregando">
              <td colspan="10">
                <span class="spinner spinner-dark"></span>
                &nbsp; Carregando agendamentos...
              </td>
            </tr>

            <tr class="empty-row" x-show="!carregando && filtrados.length === 0">
              <td colspan="10">
                <div class="empty-state">
                  <span class="empty-icon"><i data-lucide="inbox" width="25" height="25"></i></span>
                  <p x-text="agendamentos.length === 0 ? 'Nenhum agendamento encontrado.' : 'Nenhum resultado para os filtros aplicados.'"></p>
                </div>
              </td>
            </tr>

            <template x-for="row in filtrados" :key="row.id">
              <tr>
                <td class="td-data" x-text="row.dataFormatada"></td>
                <td class="td-hora" x-text="row.horario"></td>
                <td class="td-fornecedor" x-text="row.fornecedor"></td>
                <td class="td-cnpj" x-text="row.cnpj"></td>
                <td class="td-email" x-text="row.email"></td>
                <td class="td-nota" x-text="row.nota || '—'"></td>

                <td>
                  <div class="doc-list">
                    <a class="link-doc link-xml" :href="row.urlXml" target="_blank" x-show="row.urlXml">
                      <i data-lucide="file-code-2" width="15" height="15"></i> XML
                    </a>
                    <a class="link-doc link-pdf" :href="row.urlPdf" target="_blank" x-show="row.urlPdf">
                      <i data-lucide="file-text" width="15" height="15"></i> PDF
                    </a>
                  </div>
                </td>

                <td>
                  <span class="badge badge-pendente" x-show="row.aprovacao === 'PENDENTE'"><i data-lucide="clock-3" width="14" height="14"></i> Pendente</span>
                  <span class="badge badge-aprovado" x-show="row.aprovacao === 'APROVADO'"><i data-lucide="check" width="14" height="14"></i> Aprovado</span>
                  <span class="badge badge-reprovado" x-show="row.aprovacao === 'REPROVADO'"><i data-lucide="x" width="14" height="14"></i> Reprovado</span>
                </td>

                <td class="td-created" x-text="row.criadoEm"></td>

                <td>
                  <div class="acoes">
                    <template x-if="row.aprovacao === 'PENDENTE'">
                      <div class="acoes">
                        <button class="btn btn-success btn-acao" data-tip="Aprovar" @click="aprovar(row.id)">
                          <i data-lucide="check" width="16" height="16"></i>
                        </button>
                        <button class="btn btn-danger btn-acao" data-tip="Reprovar" @click="reprovar(row.id)">
                          <i data-lucide="x" width="16" height="16"></i>
                        </button>
                      </div>
                    </template>

                    <span style="color:var(--muted);font-size:.82rem;" x-show="row.aprovacao !== 'PENDENTE'">—</span>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast"
       :class="toast.tipo === 'sucesso' ? 'toast-success' : 'toast-error'"
       x-show="toast.msg" x-transition style="display:none;">
    <span x-html="toast.tipo === 'sucesso' ? '<i data-lucide=&quot;circle-check&quot; width=&quot;18&quot; height=&quot;18&quot;></i>' : '<i data-lucide=&quot;circle-alert&quot; width=&quot;18&quot; height=&quot;18&quot;></i>'"></span>
    <span x-text="toast.msg"></span>
  </div>

<script>
const URL_AP_SCRIPT = "https://script.google.com/macros/s/AKfycbzxFmbMFShUQtloUmRIv5o18cmWsWMkbwHCXQf6mGjEAyFctpL7SzI06li91esTbYYb/exec";

function validarAcessoAdmin() {
  // Precisa de um token de sessão emitido pelo login.html. A validade real
  // é checada no backend a cada chamada (token inválido -> volta ao login).
  if (sessionStorage.getItem('adminToken')) return true;

  window.location.href = 'login.html';
  return false;
}

if (!validarAcessoAdmin()) {
  document.documentElement.style.display = 'none';
}

function sairPainel() {
  const token = sessionStorage.getItem('adminToken');
  sessionStorage.removeItem('adminToken');

  // Encerra a sessão no servidor (best-effort, não bloqueia a saída)
  if (token) {
    try {
      fetch(URL_AP_SCRIPT, {
        method: 'POST',
        mode: 'cors',
        keepalive: true,
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'logout', token: token })
      });
    } catch (e) {}
  }

  const urlAtual = window.location.href.split('?')[0];
  if (urlAtual.toLowerCase().endsWith('admin.html')) {
    window.location.href = urlAtual.replace(/admin\\.html$/i, 'index.html');
    return;
  }
  window.location.href = 'index.html';
}

function renderIcons() {
  if (window.lucide) setTimeout(() => lucide.createIcons(), 0);
}

document.addEventListener('alpine:init', () => {
  Alpine.effect(() => renderIcons());
});

function painel() {
  return {
    carregando: false,
    agendamentos: [],
    filtrados: [],
    stats: {},

    filtros: {
      busca: '',
      data: '',
      aprovacao: ''
    },

    toast: {
      msg: '',
      tipo: ''
    },

    init() {
      renderIcons();
      this.carregar();
    },

    async chamarAPI(action, paramData = {}) {
      try {
        const response = await fetch(URL_AP_SCRIPT, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: action,
            data: paramData,
            token: sessionStorage.getItem('adminToken')
          })
        });
        const json = await response.json();

        // Sessão inválida/expirada no backend -> volta ao login
        if (json && json.autorizado === false) {
          sessionStorage.removeItem('adminToken');
          window.location.href = 'login.html';
          throw new Error('Sessão expirada');
        }
        return json;
      } catch (error) {
        console.error(`Erro na action ${action}:`, error);
        throw error;
      }
    },

    async carregar() {
      this.carregando = true;

      this.chamarAPI('obterEstatisticas')
        .then(s => { this.stats = s || {}; })
        .catch(err => { console.error('stats error', err); });

      this.chamarAPI('listarAgendamentos', {})
        .then(lista => {
          this.carregando = false;
          this.agendamentos = Array.isArray(lista) ? lista : [];
          this.aplicarFiltros();
          renderIcons();
        })
        .catch(() => {
          this.carregando = false;
          this.mostrarToast('Erro ao carregar agendamentos.', 'erro');
        });
    },

    aplicarFiltros() {
      const { busca, data, aprovacao } = this.filtros;

      this.filtrados = this.agendamentos.filter(row => {
        if (aprovacao && row.aprovacao !== aprovacao) return false;
        if (data && row.data !== data) return false;

        if (busca) {
          const b = busca.toLowerCase();
          const fornecedor = (row.fornecedor || '').toLowerCase();
          const cnpj = (row.cnpj || '').toLowerCase();
          if (!fornecedor.includes(b) && !cnpj.includes(b)) return false;
        }
        return true;
      });
      renderIcons();
    },

    limparFiltros() {
      this.filtros = { busca: '', data: '', aprovacao: '' };
      this.filtrados = [...this.agendamentos];
      renderIcons();
    },

    aprovar(id) {
      this.chamarAPI('aprovarAgendamento', { id: id })
        .then(res => {
          if (res && res.ok === false) {
            this.mostrarToast(res.msg || 'Erro ao aprovar.', 'erro');
            return;
          }
          const idx = this.agendamentos.findIndex(a => a.id === id);
          if (idx !== -1) this.agendamentos[idx].aprovacao = 'APROVADO';
          this.aplicarFiltros();
          this.mostrarToast('Agendamento aprovado. E-mail enviado.', 'sucesso');
        })
        .catch(() => {
          this.mostrarToast('Erro ao aprovar.', 'erro');
        });
    },

    reprovar(id) {
      this.chamarAPI('reprovarAgendamento', { id: id })
        .then(res => {
          if (res && res.ok === false) {
            this.mostrarToast(res.msg || 'Erro ao reprovar.', 'erro');
            return;
          }
          const idx = this.agendamentos.findIndex(a => a.id === id);
          if (idx !== -1 && this.agendamentos[idx].aprovacao !== 'REPROVADO') {
            this.agendamentos[idx].aprovacao = 'REPROVADO';
            this.stats.agendados = Math.max(0, (this.stats.agendados || 1) - 1);
            this.stats.reprovados = (this.stats.reprovados || 0) + 1;
          }
          this.aplicarFiltros();
          this.mostrarToast('Agendamento reprovado. E-mail enviado.', 'sucesso');
        })
        .catch(() => {
          this.mostrarToast('Erro ao reprovar.', 'erro');
        });
    },

    mostrarToast(msg, tipo) {
      this.toast = { msg, tipo };
      renderIcons();
      setTimeout(() => { this.toast.msg = ''; }, 4000);
    }
  };
}
</script>
</body>
</html>
